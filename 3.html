<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Starting Soon - The Lightning News</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            background-color: #1a2634;
            /* Initial Wallpaper */
            background-image: url('https://images.unsplash.com/photo-1472214103451-9374bd1c798e?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 1s ease-in-out;
        }

        /* Glassmorphism Effect */
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        .glass-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .serif-font {
            font-family: 'Playfair Display', serif;
        }
        
        /* Sans-serif explicit class for countdown */
        .sans-font {
            font-family: 'Quicksand', sans-serif;
        }

        /* Gentle Floating Animation */
        .float-gentle {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* Countdown Number Styling */
        .countdown-val {
            font-variant-numeric: tabular-nums;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            /* Removed serif-font here to default to Quicksand (sans-serif) */
        }

        /* Blinking cursor for status text */
        .blink-cursor::after {
            content: '|';
            animation: blink 1s step-start infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* Loading Bar Animation */
        .loading-bar-container {
            background: rgba(255,255,255,0.1);
            border-radius: 999px;
            overflow: hidden;
        }
        .loading-bar-fill {
            background: linear-gradient(90deg, rgba(255,255,255,0.4), rgba(255,255,255,0.8));
            width: 0%;
            transition: width 0.5s ease;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* Pulse Animation for Live Indicator */
        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: #ef4444;
            border-radius: 50%;
            animation: pulse-red 2s infinite;
        }
        
        @keyframes pulse-red {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* Settings Modal Transition */
        #settings-modal {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .hidden-modal {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
        }
        .visible-modal {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-white relative">

    <!-- Dark Overlay -->
    <div class="absolute inset-0 bg-black/40 z-0"></div>

    <!-- Main Container -->
    <div class="relative z-10 w-full max-w-5xl p-6 flex flex-col items-center">
        
        <!-- Top Status Bar -->
        <div class="w-full flex justify-between items-center text-xs md:text-sm text-white/40 tracking-widest uppercase font-bold mb-8 px-4">
            <div class="flex items-center gap-2">
                <i class="fas fa-signal"></i>
                <span>Signal Strength: 100%</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="pulse-dot bg-yellow-400"></div>
                <span>Standby</span>
            </div>
        </div>

        <!-- Main Card -->
        <div class="glass-panel w-full rounded-3xl p-10 md:p-16 text-center float-gentle relative overflow-hidden">
            
            <!-- Branding -->
            <h2 class="text-sm md:text-base tracking-[0.4em] uppercase text-white/60 mb-6 font-bold">
                The Lightning News
            </h2>

            <!-- Main Heading -->
            <h1 class="serif-font text-5xl md:text-7xl mb-8 text-white drop-shadow-xl italic">
                Stream Begins In
            </h1>

            <!-- Countdown Timer -->
            <div class="flex flex-wrap justify-center gap-4 md:gap-8 mb-12">
                <!-- Minutes -->
                <div class="glass-card p-4 md:p-6 rounded-2xl min-w-[100px] md:min-w-[120px]">
                    <!-- Changed class from serif-font to sans-font (Quicksand) -->
                    <div id="minutes" class="countdown-val text-4xl md:text-6xl font-bold sans-font">00</div>
                    <div class="text-xs text-white/40 uppercase tracking-widest mt-2">Minutes</div>
                </div>
                
                <div class="text-4xl md:text-6xl font-light sans-font self-center pb-8 text-white/30">:</div>

                <!-- Seconds -->
                <div class="glass-card p-4 md:p-6 rounded-2xl min-w-[100px] md:min-w-[120px]">
                    <!-- Changed class from serif-font to sans-font (Quicksand) -->
                    <div id="seconds" class="countdown-val text-4xl md:text-6xl font-bold sans-font">00</div>
                    <div class="text-xs text-white/40 uppercase tracking-widest mt-2">Seconds</div>
                </div>
            </div>

            <!-- Loading Bar -->
            <div class="max-w-md mx-auto mb-8">
                <div class="flex justify-between text-xs text-white/50 mb-2 uppercase tracking-wide">
                    <span>System Check</span>
                    <span id="percent-text">0%</span>
                </div>
                <div class="loading-bar-container h-1 w-full">
                    <div id="loading-fill" class="loading-bar-fill h-full"></div>
                </div>
            </div>

            <!-- Console Log / Status Text -->
            <div class="h-6 text-sm text-white/60 font-mono">
                <span class="text-green-400 mr-2">></span><span id="status-text" class="blink-cursor">Initializing video feed...</span>
            </div>

            <!-- Footer Info -->
            <div class="mt-12 pt-8 border-t border-white/10 flex flex-col md:flex-row justify-between items-center text-white/40 text-sm">
                <div class="mb-4 md:mb-0">
                    <i class="fas fa-map-marker-alt mr-2"></i> Live from Serene Hill
                </div>
                <div class="flex gap-6 text-lg">
                    <a href="#" class="hover:text-white transition-colors"><i class="fab fa-twitter"></i></a>
                    <a href="#" class="hover:text-white transition-colors"><i class="fab fa-twitch"></i></a>
                    <a href="#" class="hover:text-white transition-colors"><i class="fab fa-discord"></i></a>
                </div>
            </div>
            
            <div class="absolute bottom-2 right-4 text-[10px] text-white/20">
                Press any key to configure
            </div>

        </div>

    </div>
    
    <!-- Hidden Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm hidden-modal">
        <div class="glass-panel p-8 rounded-2xl w-full max-w-md mx-4 shadow-2xl">
            <h3 class="serif-font text-2xl mb-6 border-b border-white/20 pb-4">Stream Settings</h3>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs uppercase tracking-widest text-white/60 mb-2">Countdown Duration (Minutes)</label>
                    <input type="number" id="input-minutes" value="10" class="w-full bg-white/10 border border-white/20 rounded-lg p-3 text-white focus:outline-none focus:border-white/50 transition">
                </div>
                
                <div>
                    <label class="block text-xs uppercase tracking-widest text-white/60 mb-2">Background Control</label>
                    <div class="flex items-center justify-between bg-white/5 p-3 rounded-lg border border-white/10">
                        <span class="text-sm">Auto-rotate (3.14m)</span>
                        <div class="w-3 h-3 rounded-full bg-green-400 shadow-[0_0_10px_rgba(74,222,128,0.5)]"></div>
                    </div>
                    <button onclick="forceWallpaperChange()" class="mt-2 text-xs w-full py-2 bg-white/10 hover:bg-white/20 rounded border border-white/10 transition">
                        <i class="fas fa-sync-alt mr-2"></i> Skip to next wallpaper
                    </button>
                </div>
            </div>

            <div class="mt-8 flex justify-end gap-3">
                <button onclick="toggleSettings()" class="px-4 py-2 text-sm text-white/60 hover:text-white transition">Cancel</button>
                <button onclick="applySettings()" class="px-6 py-2 bg-white text-black font-bold rounded-lg hover:bg-gray-200 transition shadow-lg">Apply</button>
            </div>
        </div>
    </div>

    <!-- Particle Canvas -->
    <canvas id="canvas" class="absolute inset-0 z-0 pointer-events-none opacity-40"></canvas>

    <script>
        // --- Particle System ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.vy = (Math.random() - 0.5) * 0.3;
                this.size = Math.random() * 2;
                this.opacity = Math.random() * 0.5;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }

            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 60; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }

        window.addEventListener('resize', () => {
            resize();
            initParticles();
        });

        // --- Wallpaper System ---
        const wallpapers = [
            'https://images.unsplash.com/photo-1472214103451-9374bd1c798e?q=80&w=2070&auto=format&fit=crop', // Original Green Hills
            'https://images.unsplash.com/photo-1519681393784-d8e5b5a4570e?q=80&w=2074&auto=format&fit=crop', // Night Stars
            'https://images.unsplash.com/photo-1448375240586-dfd8f3793300?q=80&w=2000&auto=format&fit=crop', // Forest
            'https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2000&auto=format&fit=crop', // Lake Reflection
            'https://images.unsplash.com/photo-1531306728370-e2ebd9d7bb99?q=80&w=2000&auto=format&fit=crop', // Galaxy
            'https://images.unsplash.com/photo-1465146344425-f00d5f5c8f07?q=80&w=2000&auto=format&fit=crop'  // Misty
        ];
        
        let currentWallpaperIndex = 0;
        
        // 3.14 minutes in milliseconds = 3.14 * 60 * 1000 = 188400ms
        const ROTATION_INTERVAL = 3.14 * 60 * 1000; 

        function changeWallpaper() {
            currentWallpaperIndex = (currentWallpaperIndex + 1) % wallpapers.length;
            const url = wallpapers[currentWallpaperIndex];
            // Preload image to prevent flicker
            const img = new Image();
            img.onload = () => {
                document.body.style.backgroundImage = `url('${url}')`;
            };
            img.src = url;
        }

        function forceWallpaperChange() {
            changeWallpaper();
            // Reset interval timer so it doesn't change immediately again
            clearInterval(wallpaperTimer);
            wallpaperTimer = setInterval(changeWallpaper, ROTATION_INTERVAL);
        }

        let wallpaperTimer = setInterval(changeWallpaper, ROTATION_INTERVAL);

        // --- Countdown Logic ---
        let targetDate = new Date();
        targetDate.setMinutes(targetDate.getMinutes() + 10); 

        const minEl = document.getElementById('minutes');
        const secEl = document.getElementById('seconds');
        
        function updateCountdown() {
            const now = new Date();
            const diff = targetDate - now;

            if (diff <= 0) {
                minEl.innerText = "00";
                secEl.innerText = "00";
                document.getElementById('status-text').innerText = "STREAM IS LIVE";
                document.getElementById('status-text').classList.remove('blink-cursor');
                return;
            }

            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            minEl.innerText = minutes < 10 ? '0' + minutes : minutes;
            secEl.innerText = seconds < 10 ? '0' + seconds : seconds;
        }

        // --- Settings / Key Listener ---
        const modal = document.getElementById('settings-modal');
        let isSettingsOpen = false;

        function toggleSettings() {
            isSettingsOpen = !isSettingsOpen;
            if (isSettingsOpen) {
                modal.classList.remove('hidden-modal');
                modal.classList.add('visible-modal');
            } else {
                modal.classList.add('hidden-modal');
                modal.classList.remove('visible-modal');
            }
        }

        function applySettings() {
            // Get value
            const minInput = document.getElementById('input-minutes').value;
            const mins = parseInt(minInput);
            
            if (!isNaN(mins)) {
                // Reset timer based on new input
                targetDate = new Date();
                targetDate.setMinutes(targetDate.getMinutes() + mins);
                targetDate.setSeconds(targetDate.getSeconds() + 1); // small buffer
                updateCountdown();
            }

            toggleSettings(); // Close modal
        }

        window.addEventListener('keydown', (e) => {
            // Check if modal is NOT open, open it.
            // If it IS open, escape closes it.
            // Ignore if typing in input box (though input captures focus usually)
            if (e.key === 'Escape' && isSettingsOpen) {
                toggleSettings();
            } else if (!isSettingsOpen) {
                toggleSettings();
            }
        });

        // --- Status Ticker Logic ---
        const messages = [
            "Initializing video feed...",
            "Checking microphone levels...",
            "Connecting to chat server...",
            "Loading scene assets...",
            "Brewing virtual coffee...",
            "Optimizing bitrates...",
            "Syncing audio...",
            "Connection stable. Waiting for host."
        ];
        
        let msgIndex = 0;
        const statusEl = document.getElementById('status-text');
        const fillEl = document.getElementById('loading-fill');
        const percentEl = document.getElementById('percent-text');

        function updateStatus() {
            statusEl.innerText = messages[msgIndex];
            msgIndex = (msgIndex + 1) % messages.length;

            const currentWidth = parseFloat(fillEl.style.width) || 0;
            if (currentWidth < 95) {
                const newWidth = currentWidth + Math.random() * 15;
                const clampedWidth = Math.min(newWidth, 100);
                fillEl.style.width = clampedWidth + '%';
                percentEl.innerText = Math.floor(clampedWidth) + '%';
            }
        }

        // --- Init ---
        resize();
        initParticles();
        animateParticles();
        
        setInterval(updateCountdown, 1000);
        setInterval(updateStatus, 3000);
        updateCountdown();

    </script>
</body>
</html>
